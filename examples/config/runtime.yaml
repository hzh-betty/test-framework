browser: chrome
headless: true
implicit_wait: 10
log_level: INFO

keyword_libraries: []
listeners: []

smtp:
  host: smtp.example.com
  port: 465
  username: bot@example.com
  password: ${SMTP_PASSWORD}
  sender: bot@example.com
  receivers:
    - qa@example.com
  use_ssl: true

dingtalk_webhook: ${DINGTALK_WEBHOOK}

pipeline:
  deploy:
    commands:
      - echo "deploy hook disabled by default"

notifications:
  channels:
    email:
      enabled: false
      trigger: on_failure
      retries: 1
    dingtalk:
      enabled: false
      trigger: always
      retries: 1
      webhook: ${DINGTALK_WEBHOOK}
    wecom:
      enabled: false
      trigger: on_failure
      retries: 1
      webhook: ${WECOM_WEBHOOK}
    feishu:
      enabled: false
      trigger: on_failure
      retries: 1
      webhook: ${FEISHU_WEBHOOK}
