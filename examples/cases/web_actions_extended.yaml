name: WebActionsExtendedSuite
cases:
  - name: Form and wait actions
    steps:
      - keyword: Open
        args:
          - https://example.test/login
      - keyword: Wait Visible
        args:
          - id=username
        timeout: 8s
      - keyword: Wait Clickable
        args:
          - id=submit
        timeout: 8s
      - keyword: Type Text
        args:
          - id=username
          - demo
      - keyword: Type Text
        args:
          - id=password
          - demo-pass
      - keyword: Wait Text
        args:
          - id=status
          - Ready
        timeout: 6s
      - keyword: Wait URL Contains
        args:
          - /login
        timeout: 6s
      - keyword: Assert Element Visible
        args:
          - id=submit
        timeout: 6s
      - keyword: Assert Element Contains
        args:
          - id=title
          - Welcome
      - keyword: Select
        args:
          - id=country
          - China
      - keyword: Hover
        args:
          - id=profile-menu
      - keyword: Screenshot
        args:
          - artifacts/actions-form.png
  - name: Context and upload actions
    continue_on_failure: true
    steps:
      - keyword: Open
        args:
          - https://example.test/dashboard
      - keyword: Switch Frame
        args:
          - default
      - keyword: Switch Window
        args:
          - "0"
      - keyword: Accept Alert
        timeout: 5s
      - keyword: Upload File
        args:
          - id=upload
          - README.md
        continue_on_failure: true
      - keyword: Screenshot
        args:
          - artifacts/actions-context.png
