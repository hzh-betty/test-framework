name: SmokeSuite
variables:
  base_url: https://example.test
setup:
- keyword: Open
  args:
  - https://example.test/login
teardown:
- keyword: Screenshot
  args:
  - artifacts/suite-end.png
cases:
- name: Login success
  tags: smoke,login
  variables:
    username: demo
    password: mode
  retry: 2
  continue_on_failure: true
  setup:
  - keyword: Wait Visible
    args:
    - id=username
  steps:
  - keyword: Open
    args:
    - https://example.test/login
  - retry: 3
    continue_on_failure: true
    keyword: Click
    args:
    - id=submit
  teardown:
  - keyword: Screenshot
    args:
    - artifacts/case-end.png
